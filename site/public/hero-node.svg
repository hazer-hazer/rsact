<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="rsact reactive-node mark">
  <!-- Animated "reactive node" mark used inline before the home hero name.
       Self-contained CSS animation (runs when the SVG is used as a CSS
       background); the trace/pulse motif stops for reduced-motion users. -->
  <style>
    .trace  { animation: rsact-flow 1.6s linear infinite; }
    .source { animation: rsact-glow 2.2s ease-in-out infinite; }
    @keyframes rsact-flow { to { stroke-dashoffset: -24; } }
    @keyframes rsact-glow { 0%, 100% { opacity: .5; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .trace, .source { animation: none; }
    }
  </style>
  <line x1="12" y1="12" x2="36" y2="14" stroke="#3a464c" stroke-width="2"/>
  <line class="trace" x1="12" y1="12" x2="30" y2="38" stroke="#2ee6d6" stroke-width="2.5" stroke-dasharray="6 6"/>
  <circle class="source" cx="12" cy="12" r="5.5" fill="#2ee6d6"/>
  <circle cx="36" cy="14" r="5" fill="none" stroke="#5a666c" stroke-width="2"/>
  <circle cx="30" cy="38" r="5" fill="none" stroke="#2ee6d6" stroke-width="2"/>
</svg>
