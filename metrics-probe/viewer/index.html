<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rsact metrics</title>
    <!--
      Data injection point. `metrics-probe html` replaces the placeholder token
      in the block below with {"snapshots":[...],"index":{...}}. A
      type="application/json" block is data, not JS, so Vite/esbuild leave its
      contents byte-for-byte (the placeholder survives the build). In `vite
      dev`/`preview` it stays literal and the app falls back to the bundled
      sample fixture. NOTE: the token must appear exactly once in the built file
      (metrics-probe does a plain string replace), so never write it in prose.
    -->
    <script type="application/json" id="metrics-data">__DATA__</script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
