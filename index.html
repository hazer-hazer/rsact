<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rsact metrics</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; margin: 2rem; }
  h1 { font-size: 1.2rem; }
  h2 { font-size: 1rem; margin-top: 2rem; }
  table { border-collapse: collapse; margin: .5rem 0 1.5rem; }
  th, td { border: 1px solid gray; padding: .2rem .6rem; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  caption { text-align: left; font-weight: bold; margin-bottom: .3rem; }
  .dirty { opacity: .6; }
  .muted { color: gray; }
</style>
</head>
<body>
<h1>rsact framework metrics</h1>
<p class="muted">Layer-1 metrics per commit. Newest column on the right. Generated by <code>metrics-probe html</code>.</p>
<div id="root"></div>
<script>
const SNAPSHOTS = [{"git_rev":"fef0fd83c6e3171df7f6e2d2ae8ec159e2fc29a1","git_dirty":false,"recorded_at":1783439700,"host":"x86_64-linux","scenarios":[{"name":"reactive_only_16","counts":{"stored":0,"signals":16,"effects":0,"memos":0,"computed":0,"observers":17,"subscribers":32,"subscribers_bindings":32,"sources":17,"sources_bindings":32,"total":33},"heap_live_bytes":10464,"heap_peak_bytes":10464,"build_allocs":54,"build_bytes":10464,"idle_frame_allocs":0,"change_frame_allocs":1,"layout":null},{"name":"ui_labels_5","counts":{"stored":9,"signals":11,"effects":0,"memos":6,"computed":0,"observers":6,"subscribers":20,"subscribers_bindings":39,"sources":12,"sources_bindings":39,"total":32},"heap_live_bytes":16675,"heap_peak_bytes":16675,"build_allocs":63,"build_bytes":6016,"idle_frame_allocs":0,"change_frame_allocs":8,"layout":null},{"name":"ui_labels_10","counts":{"stored":14,"signals":16,"effects":0,"memos":11,"computed":0,"observers":11,"subscribers":35,"subscribers_bindings":74,"sources":22,"sources_bindings":74,"total":52},"heap_live_bytes":24598,"heap_peak_bytes":24598,"build_allocs":96,"build_bytes":10392,"idle_frame_allocs":0,"change_frame_allocs":12,"layout":null}],"section_sizes":[{"target":"thumbv7m-none-eabi","binary":"reactive","text":27544,"rodata":308,"bss":1064},{"target":"thumbv7m-none-eabi","binary":"ui","text":81036,"rodata":3816,"bss":1068},{"target":"thumbv6m-none-eabi","binary":"reactive","text":27588,"rodata":460,"bss":1064},{"target":"thumbv6m-none-eabi","binary":"ui","text":86808,"rodata":3980,"bss":1068}]}];
const METRICS = [
  ["nodes_total", s => s.counts.total],
  ["signals", s => s.counts.signals],
  ["memos", s => s.counts.memos],
  ["effects", s => s.counts.effects],
  ["observers", s => s.counts.observers],
  ["stored", s => s.counts.stored],
  ["heap_live_bytes", s => s.heap_live_bytes],
  ["heap_peak_bytes", s => s.heap_peak_bytes],
  ["build_allocs", s => s.build_allocs],
  ["idle_frame_allocs", s => s.idle_frame_allocs],
  ["change_frame_allocs", s => s.change_frame_allocs],
  ["layout_visits", s => s.layout ? s.layout.visits : null],
  ["layout_measures", s => s.layout ? s.layout.measures : null],
];
const root = document.getElementById("root");
if (!SNAPSHOTS.length) {
  root.innerHTML = "<p>No snapshots yet. Run <code>cargo run -p metrics-probe -- record</code>.</p>";
} else {
  const names = [...new Set(SNAPSHOTS.flatMap(s => s.scenarios.map(x => x.name)))];
  for (const name of names) {
    const table = document.createElement("table");
    const cap = document.createElement("caption");
    cap.textContent = name;
    table.appendChild(cap);
    const head = document.createElement("tr");
    head.innerHTML = "<th>metric</th>" + SNAPSHOTS.map(s => {
      const rev = s.git_rev.slice(0, 8) + (s.git_dirty ? "*" : "");
      return `<th class="${s.git_dirty ? "dirty" : ""}">${rev}</th>`;
    }).join("");
    table.appendChild(head);
    for (const [label, fn] of METRICS) {
      const cells = SNAPSHOTS.map(s => {
        const sc = s.scenarios.find(x => x.name === name);
        const v = sc ? fn(sc) : null;
        return `<td>${v === null || v === undefined ? '<span class=muted>-</span>' : v}</td>`;
      });
      // Skip all-empty rows (e.g. layout counters when feature was off).
      if (cells.every(c => c.includes("muted"))) continue;
      table.innerHTML += `<tr><td>${label}</td>${cells.join("")}</tr>`;
    }
    root.appendChild(table);
  }

  // Layer-2 target section sizes (bytes), one table per binary/target.
  const szKeys = [...new Set(SNAPSHOTS.flatMap(s =>
    (s.section_sizes || []).map(x => x.binary + " / " + x.target)))];
  for (const key of szKeys) {
    const [binary, target] = key.split(" / ");
    const table = document.createElement("table");
    const cap = document.createElement("caption");
    cap.textContent = "size: " + key;
    table.appendChild(cap);
    const head = document.createElement("tr");
    head.innerHTML = "<th>section</th>" + SNAPSHOTS.map(s => {
      const rev = s.git_rev.slice(0, 8) + (s.git_dirty ? "*" : "");
      return `<th class="${s.git_dirty ? "dirty" : ""}">${rev}</th>`;
    }).join("");
    table.appendChild(head);
    for (const sec of ["text", "rodata", "bss"]) {
      const cells = SNAPSHOTS.map(s => {
        const e = (s.section_sizes || []).find(x => x.binary === binary && x.target === target);
        const v = e ? e[sec] : null;
        return `<td>${v === null || v === undefined ? '<span class=muted>-</span>' : v}</td>`;
      });
      if (cells.every(c => c.includes("muted"))) continue;
      table.innerHTML += `<tr><td>.${sec}</td>${cells.join("")}</tr>`;
    }
    root.appendChild(table);
  }
}
</script>
</body>
</html>
